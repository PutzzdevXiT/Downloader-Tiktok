<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KEY GENERATOR | Putzzdev-HUB</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron'}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
color:#0ff;
overflow:hidden;
}

/* CARD */

.box{
width:350px;
padding:30px;
border-radius:18px;
background:rgba(10,20,40,.92);
border:1px solid #00ffff55;
box-shadow:0 0 25px #00ffff55,inset 0 0 20px #00ffff33;
text-align:center;
}

h1{
font-size:20px;
margin-bottom:18px;
color:#00ffff;
text-shadow:0 0 12px #00ffff;
}

/* DROPDOWN */

select{

width:100%;
padding:14px;
margin-top:10px;

border-radius:12px;
border:none;

background:#061a35;
color:#0ff;

font-size:15px;

}

/* BUTTON */

button{

width:100%;
padding:14px;
margin-top:14px;

border:none;
border-radius:12px;

background:linear-gradient(135deg,#00ffff,#0099ff);
color:#000;

font-weight:bold;
cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.05);
box-shadow:0 0 20px #00ffff;

}

.copy{
background:linear-gradient(135deg,#00ffaa,#00ffff);
}

/* INPUT */

input{

width:100%;
padding:13px;
margin-top:15px;

border-radius:10px;
border:none;

background:#000;
color:#0ff;

text-align:center;
font-weight:bold;

box-shadow:inset 0 0 10px #00ffff55;

}

</style>
</head>
<body>

<div class="box">

<h1>🔑 KEY GENERATOR<br>Putzzdev-HUB</h1>

<select id="daySelect">
<option value="1">1 DAY</option>
<option value="2">2 DAY</option>
<option value="3">3 DAY</option>
<option value="7">7 DAY</option>
<option value="30">30 DAY</option>
</select>

<button onclick="ambilKey()">AMBIL KEY</button>

<input id="hasilKey" placeholder="KEY AKAN MUNCUL" readonly>

<button class="copy" onclick="copyKey()">COPY KEY</button>

</div>

<script>

const KEY_URL="https://raw.githubusercontent.com/PutzzdevXiT/sefelink-by-putzz/refs/heads/main/key.json";

async function ambilKey(){

const day=document.getElementById("daySelect").value;
const output=document.getElementById("hasilKey");

output.value="Mengambil key...";

try{

const res=await fetch(KEY_URL);
const data=await res.json();

const item=data.duration_keys.find(k=>k.days==day);

if(!item){

output.value="Key tidak tersedia";
return;

}

output.value=item.key;

}catch{

output.value="Gagal mengambil key";

}

}

function copyKey(){

const input=document.getElementById("hasilKey");

if(!input.value)return;

input.select();
document.execCommand("copy");

alert("Key berhasil disalin");

}

</script>

</body>
</html>
