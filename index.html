<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>PUTZZDEV • KEY GENERATOR PRO</title>
  
  <!-- FONTS & ICONS -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* CYBER BACKGROUND */
    .cyber-grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    /* GLOW EFFECTS */
    .glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(0, 255, 255, 0.15);
      filter: blur(80px);
      z-index: 1;
      animation: glowPulse 4s ease-in-out infinite;
    }

    .glow-1 { top: -100px; left: -100px; }
    .glow-2 { bottom: -100px; right: -100px; background: rgba(255, 0, 255, 0.15); animation-delay: -2s; }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.2); }
    }

    /* MAIN CARD */
    .generator-card {
      position: relative;
      z-index: 10;
      width: 500px;
      background: rgba(10, 10, 20, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 30px;
      padding: 40px;
      box-shadow: 
        0 0 50px rgba(0, 255, 255, 0.2),
        inset 0 0 30px rgba(0, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .generator-card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #00ffff, #ff00ff, #00ffff);
      border-radius: 32px;
      z-index: -1;
      animation: borderRotate 4s linear infinite;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .generator-card:hover::before {
      opacity: 1;
    }

    @keyframes borderRotate {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header i {
      font-size: 48px;
      color: #00ffff;
      text-shadow: 0 0 20px #00ffff;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #00ffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      letter-spacing: 1px;
    }

    /* PASSWORD MODAL - FIXED */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
      z-index: 9999;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-box {
      width: 380px;
      background: rgba(10, 10, 20, 0.98);
      border: 2px solid #00ffff;
      border-radius: 25px;
      padding: 35px;
      text-align: center;
      box-shadow: 0 0 60px #00ffff,
                  inset 0 0 30px rgba(0, 255, 255, 0.3);
      animation: modalPop 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      position: relative;
      overflow: hidden;
      pointer-events: auto;
    }

    .modal-box::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        45deg,
        transparent,
        rgba(0, 255, 255, 0.1),
        transparent
      );
      animation: modalShine 3s linear infinite;
    }

    @keyframes modalShine {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes modalPop {
      0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    .modal-box i {
      font-size: 50px;
      color: #00ffff;
      margin-bottom: 20px;
      text-shadow: 0 0 20px #00ffff;
    }

    .modal-box h3 {
      color: #fff;
      font-size: 22px;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .modal-box .key-type {
      color: #00ffff;
      font-size: 16px;
      margin-bottom: 25px;
      padding: 8px 15px;
      background: rgba(0, 255, 255, 0.1);
      border-radius: 20px;
      display: inline-block;
    }

    .modal-box input {
      width: 100%;
      padding: 15px;
      background: #000;
      border: 2px solid #00ffff;
      border-radius: 15px;
      color: #00ffff;
      font-size: 18px;
      margin-bottom: 25px;
      text-align: center;
      font-weight: bold;
      letter-spacing: 2px;
      pointer-events: auto;
      z-index: 10000;
    }

    .modal-box input:focus {
      outline: none;
      box-shadow: 0 0 30px #00ffff;
    }

    .modal-box .btn-group {
      display: flex;
      gap: 10px;
      position: relative;
      z-index: 10000;
    }

    .modal-box button {
      flex: 1;
      padding: 12px;
      background: linear-gradient(45deg, #00ffff, #ff00ff);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      pointer-events: auto;
      position: relative;
      z-index: 10001;
    }

    .modal-box button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 255, 255, 0.4);
    }

    .modal-box button.cancel {
      background: transparent;
      border: 2px solid #ff4444;
      color: #ff4444;
    }

    .modal-box button.cancel:hover {
      background: #ff4444;
      color: #fff;
      box-shadow: 0 10px 20px rgba(255, 68, 68, 0.4);
    }

    #passwordMsg {
      margin-top: 15px;
      color: #ff4444;
      font-size: 14px;
      min-height: 20px;
    }

    /* DROPDOWN STYLE */
    .select-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .select-wrapper i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #00ffff;
      font-size: 18px;
      z-index: 1;
      text-shadow: 0 0 10px #00ffff;
    }

    select {
      width: 100%;
      padding: 15px 20px 15px 50px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid rgba(0, 255, 255, 0.3);
      border-radius: 15px;
      font-size: 16px;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      appearance: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    select:hover {
      border-color: #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
    }

    select:focus {
      outline: none;
      border-color: #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
    }

    select option {
      background: #0a0a0f;
      color: #fff;
    }

    .select-wrapper::after {
      content: '\f078';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #00ffff;
      pointer-events: none;
      text-shadow: 0 0 10px #00ffff;
    }

    /* BUTTON STYLE */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(45deg, #00ffff, #ff00ff);
      border: none;
      border-radius: 15px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s ease;
    }

    .btn-primary:hover::before {
      left: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 255, 255, 0.4);
    }

    .btn-primary i {
      font-size: 18px;
    }

    /* INPUT DISPLAY */
    .key-display {
      position: relative;
      margin: 20px 0;
    }

    .key-display i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #00ffff;
      font-size: 18px;
      text-shadow: 0 0 10px #00ffff;
    }

    input {
      width: 100%;
      padding: 15px 20px 15px 50px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid rgba(0, 255, 255, 0.3);
      border-radius: 15px;
      font-size: 14px;
      color: #00ffff;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      text-align: center;
      letter-spacing: 1px;
      box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.2);
    }

    input:focus {
      outline: none;
    }

    /* COPY BUTTON */
    .btn-copy {
      width: 100%;
      padding: 15px;
      background: transparent;
      border: 2px solid #00ffff;
      border-radius: 15px;
      font-size: 16px;
      font-weight: 600;
      color: #00ffff;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-copy:hover {
      background: #00ffff;
      color: #000;
      box-shadow: 0 0 30px #00ffff;
    }

    .btn-copy i {
      font-size: 18px;
    }

    /* STATUS MESSAGE */
    .status-msg {
      margin-top: 20px;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      font-size: 14px;
      display: none;
    }

    .status-msg.success {
      display: block;
      background: rgba(0, 255, 0, 0.1);
      border: 1px solid #00ff00;
      color: #00ff00;
    }

    .status-msg.error {
      display: block;
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid #ff0000;
      color: #ff0000;
    }

    .status-msg.warning {
      display: block;
      background: rgba(255, 255, 0, 0.1);
      border: 1px solid #ffff00;
      color: #ffff00;
    }

    .status-msg.info {
      display: block;
      background: rgba(0, 255, 255, 0.1);
      border: 1px solid #00ffff;
      color: #00ffff;
    }

    /* KEY INFO */
    .key-info {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0, 255, 255, 0.05);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 10px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
    }

    .key-info i {
      color: #00ffff;
      margin-right: 5px;
    }

    .key-info span {
      color: #00ffff;
      font-weight: 600;
    }

    .key-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 10px;
      font-weight: bold;
      margin-left: 5px;
    }

    .badge-free {
      background: #00ff00;
      color: #000;
    }

    .badge-protected {
      background: #ff00ff;
      color: #fff;
    }

    .badge-hour {
      background: #ffaa00;
      color: #000;
    }

    .badge-permanent {
      background: #ff00ff;
      color: #fff;
    }

    /* NOTIFICATION */
    .copy-notification {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 255, 255, 0.9);
      color: #000;
      padding: 12px 25px;
      border-radius: 50px;
      font-weight: bold;
      z-index: 10002;
      display: none;
      animation: slideUp 0.3s ease;
      box-shadow: 0 0 30px #00ffff;
    }

    @keyframes slideUp {
      0% { bottom: 0; opacity: 0; }
      100% { bottom: 30px; opacity: 1; }
    }

    /* FIX FOR MOBILE */
    @media (max-width: 500px) {
      .generator-card {
        width: 90%;
        padding: 30px 20px;
      }
      
      h1 {
        font-size: 22px;
      }
      
      .header i {
        font-size: 40px;
      }
      
      .modal-box {
        width: 90%;
        padding: 25px;
      }
    }
  </style>
</head>
<body>

  <!-- BACKGROUND EFFECTS -->
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="cyber-grid"></div>

  <!-- PASSWORD MODAL - FIXED -->
  <div class="modal-overlay" id="passwordModal" onclick="closePasswordModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <i class="fas fa-lock"></i>
      <h3>MASUKKAN PASSWORD</h3>
      <div class="key-type" id="modalKeyType">🔒 PROTECTED KEY</div>
      <input type="password" id="passwordInput" placeholder="PASSWORD..." autocomplete="off" onkeypress="if(event.key==='Enter') checkPassword()">
      <div class="btn-group">
        <button onclick="checkPassword()"><i class="fas fa-check"></i> SUBMIT</button>
        <button class="cancel" onclick="closePasswordModal()"><i class="fas fa-times"></i> BATAL</button>
      </div>
      <div id="passwordMsg"></div>
    </div>
  </div>

  <!-- NOTIFICATION -->
  <div class="copy-notification" id="copyNotification">
    <i class="fas fa-check-circle"></i> KEY BERHASIL DISALIN!
  </div>

  <!-- MAIN CARD -->
  <div class="generator-card">
    
    <!-- HEADER -->
    <div class="header">
      <i class="fas fa-key"></i>
      <h1>KEY GENERATOR PRO</h1>
      <div class="subtitle">PUTZZDEV SECURE SYSTEM</div>
    </div>

    <!-- DURATION SELECT -->
    <div class="select-wrapper">
      <i class="fas fa-calendar-alt"></i>
      <select id="daySelect">
        <option value="1">⚡ 1 DAY ACCESS <span style="color:#00ff00">(FREE)</span></option>
        <option value="hour">⏰ 1 JAM ACCESS <span style="color:#00ff00">(FREE)</span></option>
        <option value="2">🔒 2 DAY ACCESS <span style="color:#ff00ff">(PROTECTED)</span></option>
        <option value="3">🔒 3 DAY ACCESS <span style="color:#ff00ff">(PROTECTED)</span></option>
        <option value="7">🔒 7 DAY ACCESS <span style="color:#ff00ff">(PROTECTED)</span></option>
        <option value="30">🔒 30 DAY ACCESS <span style="color:#ff00ff">(PROTECTED)</span></option>
        <option value="permanent">∞ PERMANENT ACCESS <span style="color:#ff00ff">(PROTECTED)</span></option>
      </select>
    </div>

    <!-- GENERATE BUTTON -->
    <button class="btn-primary" onclick="handleGenerate()">
      <i class="fas fa-magic"></i>
      GENERATE KEY
    </button>

    <!-- KEY DISPLAY -->
    <div class="key-display">
      <i class="fas fa-id-card"></i>
      <input type="text" id="hasilKey" placeholder="KEY AKAN MUNCUL DISINI" readonly>
    </div>

    <!-- COPY BUTTON -->
    <button class="btn-copy" onclick="copyKey()">
      <i class="fas fa-copy"></i>
      COPY KEY
    </button>

    <!-- STATUS MESSAGE -->
    <div id="statusMsg" class="status-msg"></div>

    <!-- KEY INFO -->
    <div class="key-info">
      <i class="fas fa-shield-alt"></i> 
      KEY TERSEDIA: <br>
      <span>1D <span class="key-badge badge-free">FREE</span>, 1J <span class="key-badge badge-free">FREE</span>, 2D <span class="key-badge badge-protected">PROTECTED</span>, 3D <span class="key-badge badge-protected">PROTECTED</span>, 7D <span class="key-badge badge-protected">PROTECTED</span>, 30D <span class="key-badge badge-protected">PROTECTED</span>, ∞ <span class="key-badge badge-permanent">PROTECTED</span></span><br>
      <i class="fas fa-exclamation-triangle"></i> 
      KEY HANYA BISA DIGUNAKAN 1 KALI
    </div>
  </div>

  <script>
    const KEY_URL = "https://raw.githubusercontent.com/PutzzdevXiT/sefelink-by-putzz/main/key.json";
    const PASSWORD = "Putzzdev";
    let generatedKey = '';
    let selectedKeyType = '';
    let pendingDays = null;

    function showNotification() {
      const notif = document.getElementById('copyNotification');
      notif.style.display = 'block';
      setTimeout(() => {
        notif.style.display = 'none';
      }, 2000);
    }

    function handleGenerate() {
      const select = document.getElementById("daySelect");
      const days = select.value;
      
      // FREE keys (1D & 1 Jam) - langsung generate tanpa password
      if (days === "1" || days === "hour") {
        ambilKey(days);
      } else {
        // PROTECTED keys - minta password dulu
        pendingDays = days;
        
        // Set modal title
        let keyTypeText = '';
        switch(days) {
          case '2':
            keyTypeText = '🔒 2 DAY KEY (PROTECTED)';
            break;
          case '3':
            keyTypeText = '🔒 3 DAY KEY (PROTECTED)';
            break;
          case '7':
            keyTypeText = '🔒 7 DAY KEY (PROTECTED)';
            break;
          case '30':
            keyTypeText = '🔒 30 DAY KEY (PROTECTED)';
            break;
          case 'permanent':
            keyTypeText = '∞ PERMANENT KEY (PROTECTED)';
            break;
        }
        
        document.getElementById('modalKeyType').innerHTML = keyTypeText;
        document.getElementById('passwordModal').classList.add('active');
        
        // Focus input dengan delay biar modal kebuka dulu
        setTimeout(() => {
          document.getElementById('passwordInput').focus();
        }, 300);
        
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordMsg').innerHTML = '';
      }
    }

    function closePasswordModal() {
      document.getElementById('passwordModal').classList.remove('active');
      pendingDays = null;
    }

    function checkPassword() {
      const pass = document.getElementById('passwordInput').value;
      const msg = document.getElementById('passwordMsg');
      
      if (pass === PASSWORD) {
        // Password benar
        msg.style.color = '#00ff00';
        msg.innerHTML = '<i class="fas fa-check-circle"></i> Password benar! Mengambil key...';
        
        // Langsung ambil key tanpa nunggu lama
        if (pendingDays) {
          ambilKey(pendingDays, true); // true = auto copy
          pendingDays = null;
        }
        
        // Tutup modal
        setTimeout(() => {
          closePasswordModal();
        }, 500);
        
      } else {
        // Password salah
        msg.style.color = '#ff4444';
        msg.innerHTML = '<i class="fas fa-times-circle"></i> Password salah!';
        document.getElementById('passwordInput').style.borderColor = '#ff4444';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    }

    async function ambilKey(days, autoCopy = false) {
      const output = document.getElementById("hasilKey");
      const statusMsg = document.getElementById("statusMsg");
      
      // Reset status
      statusMsg.className = 'status-msg';
      output.value = "MENGAMBIL KEY...";
      output.style.color = "#ffff00";

      try {
        console.log("Mengambil key untuk days:", days);
        const res = await fetch(KEY_URL);
        
        if (!res.ok) {
          throw new Error('Network response was not ok');
        }
        
        const data = await res.json();
        console.log("Data dari JSON:", data);
        
        let item = null;
        
        // Handle different key types
        if (days === "hour") {
          // Generate key 1 jam
          const hourKey = "PUTZZDEV-1HOUR-" + Math.random().toString(36).substring(2, 10).toUpperCase();
          item = { key: hourKey, type: "hour" };
        } else if (days === "permanent") {
          // Cari key permanent dari JSON atau generate
          item = data.duration_keys.find(k => k.days === "permanent" || k.type === "permanent");
          if (!item || item.key === "TIDAK TERSEDIA") {
            item = { key: "PUTZZDEV-PERMANENT-9999", type: "permanent" };
          }
        } else {
          // Regular days - cari berdasarkan days
          item = data.duration_keys.find(k => k.days == days);
          console.log("Item ditemukan untuk days", days, ":", item);
        }
        
        if (!item || item.key === "TIDAK TERSEDIA") {
          // Generate random key as fallback
          let fallbackKey = '';
          if (days === "permanent") {
            fallbackKey = "PUTZZDEV-PERMANENT-" + Math.random().toString(36).substring(2, 10).toUpperCase();
          } else if (days === "hour") {
            fallbackKey = "PUTZZDEV-1HOUR-" + Math.random().toString(36).substring(2, 10).toUpperCase();
          } else {
            fallbackKey = "PUTZZDEV-" + days + "D-" + Math.random().toString(36).substring(2, 10).toUpperCase();
          }
          
          output.value = fallbackKey;
          output.style.color = "#00ffff";
          generatedKey = fallbackKey;
          
          let typeInfo = '';
          if (days === "permanent") typeInfo = 'PERMANEN';
          else if (days === "hour") typeInfo = '1 JAM';
          else typeInfo = days + ' HARI';
          
          statusMsg.className = 'status-msg info';
          statusMsg.innerHTML = `<i class="fas fa-info-circle"></i> Key ${typeInfo} generated!`;
          
          // Auto copy jika diminta
          if (autoCopy) {
            setTimeout(() => {
              copyKey(true);
              showNotification();
            }, 300);
          }
          return;
        }

        // Key ditemukan
        output.value = item.key;
        output.style.color = "#00ffff";
        generatedKey = item.key;
        
        // Show success message
        let typeInfo = '';
        if (days === "permanent") typeInfo = 'PERMANEN';
        else if (days === "hour") typeInfo = '1 JAM';
        else typeInfo = days + ' HARI';
        
        statusMsg.className = 'status-msg success';
        statusMsg.innerHTML = `<i class="fas fa-check-circle"></i> Key ${typeInfo} berhasil digenerate!`;
        
        // Auto copy jika diminta (untuk protected keys) atau selalu auto copy untuk free keys
        if (autoCopy) {
          setTimeout(() => {
            copyKey(true);
            showNotification();
          }, 300);
        } else {
          // Auto copy untuk free keys
          setTimeout(() => {
            copyKey(true);
          }, 300);
        }

      } catch (error) {
        console.error('Error:', error);
        
        // Fallback - generate random key
        let fallbackKey = '';
        if (days === "permanent") {
          fallbackKey = "PUTZZDEV-PERMANENT-" + Math.random().toString(36).substring(2, 10).toUpperCase();
        } else if (days === "hour") {
          fallbackKey = "PUTZZDEV-1HOUR-" + Math.random().toString(36).substring(2, 10).toUpperCase();
        } else {
          fallbackKey = "PUTZZDEV-" + days + "D-" + Math.random().toString(36).substring(2, 10).toUpperCase();
        }
        
        output.value = fallbackKey;
        output.style.color = "#00ffff";
        generatedKey = fallbackKey;
        
        statusMsg.className = 'status-msg info';
        statusMsg.innerHTML = '<i class="fas fa-info-circle"></i> Key generated locally (offline mode)';
        
        if (autoCopy) {
          setTimeout(() => {
            copyKey(true);
            showNotification();
          }, 300);
        }
      }
    }

    function copyKey(silent = false) {
      const output = document.getElementById("hasilKey");
      const statusMsg = document.getElementById("statusMsg");
      
      if (!output.value || output.value.includes("MENGAMBIL KEY")) {
        if (!silent) {
          statusMsg.className = 'status-msg warning';
          statusMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Tidak ada key untuk disalin';
        }
        return;
      }

      // Copy to clipboard
      output.select();
      output.setSelectionRange(0, 99999);
      
      try {
        navigator.clipboard.writeText(output.value).then(() => {
          if (!silent) {
            statusMsg.className = 'status-msg success';
            statusMsg.innerHTML = '<i class="fas fa-check-circle"></i> Key berhasil disalin ke clipboard!';
          }
          
          // Visual feedback
          const copyBtn = document.querySelector('.btn-copy');
          copyBtn.style.background = '#00ffff';
          copyBtn.style.color = '#000';
          setTimeout(() => {
            copyBtn.style.background = '';
            copyBtn.style.color = '';
          }, 500);
        }).catch(() => {
          document.execCommand("copy");
          if (!silent) {
            statusMsg.className = 'status-msg success';
            statusMsg.innerHTML = '<i class="fas fa-check-circle"></i> Key berhasil disalin!';
          }
        });
      } catch (err) {
        document.execCommand("copy");
        if (!silent) {
          statusMsg.className = 'status-msg success';
          statusMsg.innerHTML = '<i class="fas fa-check-circle"></i> Key berhasil disalin!';
        }
      }

      // Auto hide status after 3 seconds
      setTimeout(() => {
        if (statusMsg.classList.contains('success')) {
          statusMsg.className = 'status-msg';
        }
      }, 3000);
    }

    // Close modal with Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.getElementById('passwordModal').classList.contains('active')) {
        closePasswordModal();
      }
    });

    // Prevent modal from closing when clicking inside
    document.querySelector('.modal-box').addEventListener('click', (e) => {
      e.stopPropagation();
    });
  </script>
</body>
</html>
