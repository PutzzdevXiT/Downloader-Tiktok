<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>PUTZZDEV • KEY GENERATOR PRO</title>
  
  <!-- FONTS & ICONS -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* CYBER BACKGROUND */
    .cyber-grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    /* GLOW EFFECTS */
    .glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(0, 255, 255, 0.15);
      filter: blur(80px);
      z-index: 1;
      animation: glowPulse 4s ease-in-out infinite;
    }

    .glow-1 { top: -100px; left: -100px; }
    .glow-2 { bottom: -100px; right: -100px; background: rgba(255, 0, 255, 0.15); animation-delay: -2s; }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.2); }
    }

    /* MAIN CARD */
    .generator-card {
      position: relative;
      z-index: 10;
      width: 500px;
      background: rgba(10, 10, 20, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 30px;
      padding: 40px;
      box-shadow: 
        0 0 50px rgba(0, 255, 255, 0.2),
        inset 0 0 30px rgba(0, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .generator-card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #00ffff, #ff00ff, #00ffff);
      border-radius: 32px;
      z-index: -1;
      animation: borderRotate 4s linear infinite;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .generator-card:hover::before {
      opacity: 1;
    }

    @keyframes borderRotate {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header i {
      font-size: 48px;
      color: #00ffff;
      text-shadow: 0 0 20px #00ffff;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #00ffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      letter-spacing: 1px;
    }

    /* PASSWORD MODAL */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
      z-index: 9999;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-box {
      width: 380px;
      background: rgba(10, 10, 20, 0.98);
      border: 2px solid #00ffff;
      border-radius: 25px;
      padding: 35px;
      text-align: center;
      box-shadow: 0 0 60px #00ffff,
                  inset 0 0 30px rgba(0, 255, 255, 0.3);
      animation: modalPop 0.4s ease;
    }

    @keyframes modalPop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .modal-box i {
      font-size: 50px;
      color: #00ffff;
      margin-bottom: 20px;
    }

    .modal-box h3 {
      color: #fff;
      font-size: 22px;
      margin-bottom: 10px;
    }

    .modal-box .key-type {
      color: #00ffff;
      font-size: 16px;
      margin-bottom: 25px;
      padding: 8px 15px;
      background: rgba(0, 255, 255, 0.1);
      border-radius: 20px;
      display: inline-block;
    }

    .modal-box input {
      width: 100%;
      padding: 15px;
      background: #000;
      border: 2px solid #00ffff;
      border-radius: 15px;
      color: #00ffff;
      font-size: 18px;
      margin-bottom: 25px;
      text-align: center;
    }

    .modal-box .btn-group {
      display: flex;
      gap: 10px;
    }

    .modal-box button {
      flex: 1;
      padding: 12px;
      background: linear-gradient(45deg, #00ffff, #ff00ff);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    .modal-box button.cancel {
      background: transparent;
      border: 2px solid #ff4444;
      color: #ff4444;
    }

    /* DROPDOWN STYLE */
    .select-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .select-wrapper i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #00ffff;
      z-index: 1;
    }

    select {
      width: 100%;
      padding: 15px 20px 15px 50px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid rgba(0, 255, 255, 0.3);
      border-radius: 15px;
      font-size: 16px;
      color: #fff;
      appearance: none;
      cursor: pointer;
    }

    select:hover {
      border-color: #00ffff;
    }

    .select-wrapper::after {
      content: '\f078';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #00ffff;
    }

    /* BUTTON STYLE */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(45deg, #00ffff, #ff00ff);
      border: none;
      border-radius: 15px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 255, 255, 0.4);
    }

    /* KEY DISPLAY */
    .key-display {
      position: relative;
      margin: 20px 0;
    }

    .key-display i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #00ffff;
    }

    input {
      width: 100%;
      padding: 15px 20px 15px 50px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid rgba(0, 255, 255, 0.3);
      border-radius: 15px;
      font-size: 14px;
      color: #00ffff;
      text-align: center;
    }

    /* COPY BUTTON */
    .btn-copy {
      width: 100%;
      padding: 15px;
      background: transparent;
      border: 2px solid #00ffff;
      border-radius: 15px;
      font-size: 16px;
      font-weight: 600;
      color: #00ffff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-copy:hover {
      background: #00ffff;
      color: #000;
    }

    /* STATUS MESSAGE */
    .status-msg {
      margin-top: 20px;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      font-size: 14px;
      display: none;
    }

    .status-msg.success {
      display: block;
      background: rgba(0, 255, 0, 0.1);
      border: 1px solid #00ff00;
      color: #00ff00;
    }

    .status-msg.error {
      display: block;
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid #ff0000;
      color: #ff0000;
    }

    /* KEY INFO */
    .key-info {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0, 255, 255, 0.05);
      border-radius: 10px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
    }

    .key-info span {
      color: #00ffff;
      font-weight: 600;
    }

    .key-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 10px;
      margin-left: 5px;
    }

    .badge-free {
      background: #00ff00;
      color: #000;
    }

    .badge-protected {
      background: #ff00ff;
      color: #fff;
    }

    .badge-hour {
      background: #ffaa00;
      color: #000;
    }

    /* NOTIFICATION */
    .copy-notification {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 255, 255, 0.9);
      color: #000;
      padding: 12px 25px;
      border-radius: 50px;
      font-weight: bold;
      z-index: 10002;
      display: none;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      0% { bottom: 0; opacity: 0; }
      100% { bottom: 30px; opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- BACKGROUND EFFECTS -->
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="cyber-grid"></div>

  <!-- PASSWORD MODAL -->
  <div class="modal-overlay" id="passwordModal" onclick="closePasswordModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <i class="fas fa-lock"></i>
      <h3>MASUKKAN PASSWORD</h3>
      <div class="key-type" id="modalKeyType">🔒 PROTECTED KEY</div>
      <input type="password" id="passwordInput" placeholder="PASSWORD..." autocomplete="off" onkeypress="if(event.key==='Enter') checkPassword()">
      <div class="btn-group">
        <button onclick="checkPassword()"><i class="fas fa-check"></i> SUBMIT</button>
        <button class="cancel" onclick="closePasswordModal()"><i class="fas fa-times"></i> BATAL</button>
      </div>
      <div id="passwordMsg"></div>
    </div>
  </div>

  <!-- NOTIFICATION -->
  <div class="copy-notification" id="copyNotification">
    <i class="fas fa-check-circle"></i> KEY BERHASIL DISALIN!
  </div>

  <!-- MAIN CARD -->
  <div class="generator-card">
    
    <div class="header">
      <i class="fas fa-key"></i>
      <h1>KEY GENERATOR PRO</h1>
      <div class="subtitle">PUTZZDEV SECURE SYSTEM</div>
    </div>

    <div class="select-wrapper">
      <i class="fas fa-calendar-alt"></i>
      <select id="daySelect">
        <option value="1">⚡ 1 DAY ACCESS</option>
        <option value="hour">⏰ 1 JAM ACCESS</option>
        <option value="2">🔒 2 DAY ACCESS</option>
        <option value="3">🔒 3 DAY ACCESS</option>
        <option value="7">🔒 7 DAY ACCESS</option>
        <option value="30">🔒 30 DAY ACCESS</option>
        <option value="permanent">∞ PERMANENT ACCESS</option>
      </select>
    </div>

    <button class="btn-primary" onclick="handleGenerate()">
      <i class="fas fa-magic"></i> GENERATE KEY
    </button>

    <div class="key-display">
      <i class="fas fa-id-card"></i>
      <input type="text" id="hasilKey" placeholder="KEY AKAN MUNCUL DISINI" readonly>
    </div>

    <button class="btn-copy" onclick="copyKey()">
      <i class="fas fa-copy"></i> COPY KEY
    </button>

    <div id="statusMsg" class="status-msg"></div>

    <div class="key-info">
      <i class="fas fa-shield-alt"></i> 
      KEY TERSEDIA: <br>
      <span>1D, 1J, 2D, 3D, 7D, 30D, PERMANEN</span>
    </div>
  </div>

  <script>
    const KEY_URL = "https://raw.githubusercontent.com/PutzzdevXiT/sefelink-by-putzz/main/key.json";
    const PASSWORD = "Putzzdev";
    let generatedKey = '';
    let pendingDays = null;

    // Cache untuk menyimpan key dari JSON
    let keyCache = null;

    // Fungsi untuk mengambil key dari JSON
    async function getKeyFromJSON(days) {
      try {
        // Kalau belum ada cache, ambil dulu
        if (!keyCache) {
          console.log("Mengambil data dari JSON...");
          const res = await fetch(KEY_URL);
          if (!res.ok) throw new Error('Gagal mengambil data');
          keyCache = await res.json();
          console.log("Data JSON:", keyCache);
        }

        // Cari key berdasarkan days
        let item = null;
        
        if (days === "hour") {
          // Cari key 1 jam di JSON (days: "0.04167" atau type: "hour")
          item = keyCache.duration_keys.find(k => k.days === "0.04167" || k.type === "hour");
          console.log("Mencari key 1 jam di JSON:", item);
        } else if (days === "permanent") {
          // Cari key permanent
          item = keyCache.duration_keys.find(k => k.days === "permanent" || k.type === "permanent");
        } else {
          // Cari berdasarkan days (1,2,3,7,30)
          item = keyCache.duration_keys.find(k => k.days == days);
          console.log(`Mencari key untuk ${days} hari:`, item);
        }

        return item;
      } catch (error) {
        console.error("Error mengambil JSON:", error);
        return null;
      }
    }

    function showNotification() {
      const notif = document.getElementById('copyNotification');
      notif.style.display = 'block';
      setTimeout(() => {
        notif.style.display = 'none';
      }, 2000);
    }

    function handleGenerate() {
      const select = document.getElementById("daySelect");
      const days = select.value;
      
      // Cek apakah key butuh password
      if (days === "2" || days === "3" || days === "7" || days === "30" || days === "permanent") {
        // PROTECTED keys - minta password dulu
        pendingDays = days;
        
        let keyTypeText = '';
        switch(days) {
          case '2': keyTypeText = '🔒 2 DAY KEY'; break;
          case '3': keyTypeText = '🔒 3 DAY KEY'; break;
          case '7': keyTypeText = '🔒 7 DAY KEY'; break;
          case '30': keyTypeText = '🔒 30 DAY KEY'; break;
          case 'permanent': keyTypeText = '∞ PERMANENT KEY'; break;
        }
        
        document.getElementById('modalKeyType').innerHTML = keyTypeText;
        document.getElementById('passwordModal').classList.add('active');
        setTimeout(() => {
          document.getElementById('passwordInput').focus();
        }, 300);
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordMsg').innerHTML = '';
      } else {
        // FREE keys (1D & 1 Jam) - langsung generate
        ambilKey(days, false);
      }
    }

    function closePasswordModal() {
      document.getElementById('passwordModal').classList.remove('active');
      pendingDays = null;
    }

    function checkPassword() {
      const pass = document.getElementById('passwordInput').value;
      const msg = document.getElementById('passwordMsg');
      
      if (pass === PASSWORD) {
        msg.style.color = '#00ff00';
        msg.innerHTML = '<i class="fas fa-check-circle"></i> Password benar!';
        
        if (pendingDays) {
          ambilKey(pendingDays, true);
          pendingDays = null;
        }
        
        setTimeout(() => {
          closePasswordModal();
        }, 500);
        
      } else {
        msg.style.color = '#ff4444';
        msg.innerHTML = '<i class="fas fa-times-circle"></i> Password salah!';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    }

    async function ambilKey(days, autoCopy = false) {
      const output = document.getElementById("hasilKey");
      const statusMsg = document.getElementById("statusMsg");
      
      statusMsg.className = 'status-msg';
      output.value = "MENGAMBIL KEY...";
      output.style.color = "#ffff00";

      try {
        // Ambil key dari JSON
        const item = await getKeyFromJSON(days);
        
        let keyValue = '';
        
        if (item && item.key && item.key !== "TIDAK TERSEDIA") {
          // Gunakan key dari JSON
          keyValue = item.key;
          console.log(`Menggunakan key dari JSON: ${keyValue}`);
        } else {
          // Key tidak tersedia di JSON
          output.value = "KEY TIDAK TERSEDIA";
          output.style.color = "#ff4444";
          statusMsg.className = 'status-msg error';
          statusMsg.innerHTML = '<i class="fas fa-times-circle"></i> Key tidak tersedia di server';
          return;
        }

        // Tampilkan key
        output.value = keyValue;
        output.style.color = "#00ffff";
        generatedKey = keyValue;
        
        // Tampilkan pesan sukses
        let typeInfo = '';
        if (days === "permanent") typeInfo = 'PERMANEN';
        else if (days === "hour") typeInfo = '1 JAM';
        else typeInfo = days + ' HARI';
        
        statusMsg.className = 'status-msg success';
        statusMsg.innerHTML = `<i class="fas fa-check-circle"></i> Key ${typeInfo} berhasil digenerate!`;
        
        // Auto copy
        setTimeout(() => {
          copyKey(true);
          if (autoCopy) showNotification();
        }, 300);

      } catch (error) {
        console.error('Error:', error);
        
        // Error - key tidak bisa diambil
        output.value = "GAGAL MENGAMBIL KEY";
        output.style.color = "#ff4444";
        statusMsg.className = 'status-msg error';
        statusMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Gagal terhubung ke server';
      }
    }

    function copyKey(silent = false) {
      const output = document.getElementById("hasilKey");
      const statusMsg = document.getElementById("statusMsg");
      
      if (!output.value || output.value.includes("MENGAMBIL KEY") || output.value.includes("TIDAK TERSEDIA") || output.value.includes("GAGAL")) {
        if (!silent) {
          statusMsg.className = 'status-msg warning';
          statusMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Tidak ada key valid untuk disalin';
        }
        return;
      }

      output.select();
      output.setSelectionRange(0, 99999);
      
      try {
        navigator.clipboard.writeText(output.value).then(() => {
          if (!silent) {
            statusMsg.className = 'status-msg success';
            statusMsg.innerHTML = '<i class="fas fa-check-circle"></i> Key disalin!';
          }
        }).catch(() => {
          document.execCommand("copy");
        });
      } catch (err) {
        document.execCommand("copy");
      }
    }

    // Event listeners
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.getElementById('passwordModal').classList.contains('active')) {
        closePasswordModal();
      }
    });

    document.querySelector('.modal-box').addEventListener('click', (e) => {
      e.stopPropagation();
    });
  </script>
</body>
</html>
