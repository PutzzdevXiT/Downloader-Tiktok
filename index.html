<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KEY GENERATOR | Putzzdev-HUB</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
color:#0ff;
overflow:hidden;
}

/* animated background */

body::before{
content:'';
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#00ffff33 0%,transparent 60%);
animation:movebg 8s linear infinite;
}

@keyframes movebg{
0%{transform:translate(-25%,-25%)}
100%{transform:translate(25%,25%)}
}

/* card */

.box{
width:360px;
padding:35px;
border-radius:20px;
background:rgba(10,20,40,0.95);
border:1px solid #00ffff55;
box-shadow:
0 0 20px #00ffff55,
inset 0 0 20px #00ffff22;
text-align:center;
backdrop-filter:blur(10px);
animation:float 4s ease-in-out infinite;
}

@keyframes float{
50%{transform:translateY(-10px)}
}

h1{
font-size:20px;
margin-bottom:20px;
letter-spacing:2px;
color:#00ffff;
text-shadow:0 0 10px #00ffff;
}

/* button */

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
background:linear-gradient(135deg,#00ffff,#0099ff);
color:#000;
transition:.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ffff;
}

/* input */

input{
width:100%;
padding:13px;
margin-top:15px;
border-radius:10px;
border:none;
background:#000;
color:#0ff;
text-align:center;
font-weight:bold;
box-shadow:inset 0 0 10px #00ffff55;
}

.copy{
background:linear-gradient(135deg,#00ffaa,#00ffff);
}

/* particles */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="box">

<h1>🔑 KEY GENERATOR<br>Putzzdev-HUB</h1>

<button onclick="ambilKey()">GENERATE KEY 1 DAY</button>

<input id="hasilKey" placeholder="KEY AKAN MUNCUL DISINI" readonly>

<button class="copy" onclick="copyKey()">COPY KEY</button>

</div>

<script>

const KEY_URL = "https://raw.githubusercontent.com/PutzzdevXiT/sefelink-by-putzz/main/key.json";

async function ambilKey(){

try{

const res = await fetch(KEY_URL);
const data = await res.json();

document.getElementById("hasilKey").value = data.duration_keys[0].key;

}catch{

alert("Gagal mengambil key");

}

}

function copyKey(){

const input = document.getElementById("hasilKey");

if(!input.value) return;

input.select();
document.execCommand("copy");

alert("Key berhasil disalin");

}

/* PARTICLES */

const c=document.getElementById("particles");
const ctx=c.getContext("2d");

let w,h,particles=[];

function resize(){
w=c.width=window.innerWidth;
h=c.height=window.innerHeight;
}

window.onresize=resize;
resize();

for(let i=0;i<80;i++){

particles.push({

x:Math.random()*w,
y:Math.random()*h,
vx:(Math.random()-.5)*0.6,
vy:(Math.random()-.5)*0.6

});

}

function animate(){

ctx.clearRect(0,0,w,h);

particles.forEach(p=>{

p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>w)p.vx*=-1;
if(p.y<0||p.y>h)p.vy*=-1;

ctx.fillStyle="#00ffff";
ctx.fillRect(p.x,p.y,2,2);

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
