<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drip Client KEY Generator | by Putzzdev</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .cyber-grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    .glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(0, 255, 255, 0.15);
      filter: blur(80px);
      z-index: 1;
      animation: glowPulse 4s ease-in-out infinite;
    }

    .glow-1 { top: -100px; left: -100px; }
    .glow-2 { bottom: -100px; right: -100px; background: rgba(255, 0, 255, 0.15); animation-delay: -2s; }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.2); }
    }

    .generator-card {
      position: relative;
      z-index: 10;
      width: 550px;
      background: rgba(10, 10, 20, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 30px;
      padding: 40px;
      box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header i {
      font-size: 48px;
      color: #00ffff;
      text-shadow: 0 0 20px #00ffff;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #00ffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      margin-top: 5px;
    }

    .select-wrapper, .input-key-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .select-wrapper i, .input-key-wrapper i, .key-display i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #00ffff;
      z-index: 1;
    }

    select, #manualKeyInput, #hasilKey {
      width: 100%;
      padding: 15px 20px 15px 50px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid rgba(0, 255, 255, 0.3);
      border-radius: 15px;
      font-size: 16px;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
    }

    select:hover, #manualKeyInput:focus {
      border-color: #00ffff;
    }

    .select-wrapper::after {
      content: '\f078';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #00ffff;
    }

    .btn-primary, .btn-copy {
      width: 100%;
      padding: 15px;
      border-radius: 15px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-primary {
      background: linear-gradient(45deg, #00ffff, #ff00ff);
      border: none;
      color: #fff;
    }

    .btn-copy {
      background: transparent;
      border: 2px solid #00ffff;
      color: #00ffff;
    }

    .btn-primary:hover, .btn-copy:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 255, 255, 0.4);
    }

    .key-info {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0, 255, 255, 0.05);
      border-radius: 10px;
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
    }

    .key-info span {
      color: #00ffff;
      font-weight: 600;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
      z-index: 9999;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-box {
      width: 380px;
      background: rgba(10, 10, 20, 0.98);
      border: 2px solid #00ffff;
      border-radius: 25px;
      padding: 35px;
      text-align: center;
      box-shadow: 0 0 60px #00ffff;
    }

    .modal-box i {
      font-size: 50px;
      color: #00ffff;
      margin-bottom: 20px;
    }

    .modal-box h3 {
      color: #fff;
      font-size: 22px;
    }

    .modal-box .key-type {
      color: #00ffff;
      margin: 15px 0;
      padding: 8px 15px;
      background: rgba(0, 255, 255, 0.1);
      border-radius: 20px;
      display: inline-block;
    }

    .modal-box input {
      width: 100%;
      padding: 15px;
      background: #000;
      border: 2px solid #00ffff;
      border-radius: 15px;
      color: #00ffff;
      font-size: 18px;
      margin-bottom: 20px;
      text-align: center;
    }

    .modal-box button {
      padding: 12px 20px;
      background: linear-gradient(45deg, #00ffff, #ff00ff);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    .success-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      z-index: 10000;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .success-modal-overlay.active {
      display: flex;
    }

    .success-modal-box {
      width: 450px;
      background: rgba(10, 10, 20, 0.98);
      border: 3px solid #00ff00;
      border-radius: 30px;
      padding: 40px;
      text-align: center;
    }

    .success-modal-box i {
      font-size: 70px;
      color: #00ff00;
      margin-bottom: 20px;
    }

    .success-modal-box h2 {
      color: #00ff00;
      font-size: 24px;
    }

    .success-key {
      background: rgba(0, 255, 0, 0.1);
      border: 2px solid #00ff00;
      border-radius: 15px;
      padding: 15px;
      margin: 20px 0;
      font-family: monospace;
      font-size: 18px;
      color: #00ff00;
    }

    .copy-notification {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #00ffff;
      color: #000;
      padding: 12px 25px;
      border-radius: 50px;
      font-weight: bold;
      z-index: 10002;
      display: none;
    }

    .saving-notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #00ffff;
      color: #000;
      padding: 15px 25px;
      border-radius: 50px;
      display: none;
      align-items: center;
      gap: 10px;
      z-index: 2000;
    }

    @media (max-width: 500px) {
      .generator-card { width: 90%; padding: 30px 20px; }
      .success-modal-box { width: 90%; padding: 30px; }
    }
  </style>
</head>
<body>

  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="cyber-grid"></div>

  <div class="saving-notification" id="savingNotification">
    <i class="fas fa-database"></i>
    <span>Menyimpan key ke DATABASE...</span>
  </div>

  <div class="modal-overlay" id="passwordModal">
    <div class="modal-box">
      <i class="fas fa-lock"></i>
      <h3>MASUKKAN PASSWORD</h3>
      <div class="key-type" id="modalKeyType">🔒 PROTECTED KEY</div>
      <input type="password" id="passwordInput" placeholder="PASSWORD..." autocomplete="off">
      <button onclick="checkPassword()">SUBMIT</button>
      <button onclick="closePasswordModal()" style="margin-top:10px; background:transparent; border:2px solid #ff4444; color:#ff4444;">BATAL</button>
      <div id="passwordMsg" style="margin-top:10px;"></div>
    </div>
  </div>

  <div class="success-modal-overlay" id="successModal">
    <div class="success-modal-box">
      <i class="fas fa-check-circle"></i>
      <h2 id="successTitle">KEY BERHASIL DIBUAT!</h2>
      <div class="success-key" id="successKey">PUTZZDEV-ABC123</div>
      <div class="success-detail" id="successDetail" style="color:#fff; margin:10px 0;"></div>
      <button onclick="closeSuccessModal()">OK</button>
    </div>
  </div>

  <div class="copy-notification" id="copyNotification">
    <i class="fas fa-check-circle"></i> KEY BERHASIL DISALIN!
  </div>

  <div class="generator-card">
    <div class="header">
      <i class="fas fa-key"></i>
      <h1>Drip Client KEY</h1>
      <div class="subtitle">GENERATOR by Putzzdev</div>
    </div>

    <div class="select-wrapper">
      <i class="fas fa-calendar-alt"></i>
      <select id="daySelect">
        <option value="hour">⏰ 1 JAM ACCESS (FREE)</option>
        <option value="1">⚡ 1 HARI ACCESS (FREE)</option>
        <option value="2">🔒 2 HARI ACCESS (PROTECTED)</option>
        <option value="3">🔒 3 HARI ACCESS (PROTECTED)</option>
        <option value="7">🔒 7 HARI ACCESS (PROTECTED)</option>
        <option value="30">🔒 30 HARI ACCESS (PROTECTED)</option>
        <option value="permanent">∞ PERMANENT ACCESS (PROTECTED)</option>
      </select>
    </div>

    <div class="input-key-wrapper">
      <i class="fas fa-pencil-alt"></i>
      <input type="text" id="manualKeyInput" placeholder="KETIK KEY KAMU DI SINI...">
    </div>

    <button class="btn-primary" onclick="handleSaveKey()">
      <i class="fas fa-save"></i> SIMPAN KEY KE DATABASE
    </button>

    <div class="key-display">
      <i class="fas fa-id-card"></i>
      <input type="text" id="hasilKey" placeholder="KEY AKAN MUNCUL DISINI" readonly>
    </div>

    <button class="btn-copy" onclick="copyKey()">
      <i class="fas fa-copy"></i> COPY KEY
    </button>

    <div class="key-info">
      <i class="fas fa-database"></i> KEY TERSIMPAN DI DATABASE: <br>
      <span id="keyCount">0</span> key telah tersimpan
    </div>
  </div>

  <!-- FIREBASE SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <script>
    const PASSWORD = "Putzzdev";
    
    // 🔥 FIREBASE CONFIG - UDAH DIUPDATE DENGAN YANG BARU!
    const firebaseConfig = {
      apiKey: "AIzaSyA46ZmuG5ZTzugWxc74574_bH3WSflC5EE",
      authDomain: "key-database-701af.firebaseapp.com",
      databaseURL: "https://key-database-701af-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "key-database-701af",
      storageBucket: "key-database-701af.firebasestorage.app",
      messagingSenderId: "884537246195",
      appId: "1:884537246195:web:62e982cfbe81af74c0d286"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let pendingDays = null;
    let pendingKey = null;
    let allKeys = [];

    async function loadKeysFromFirebase() {
      try {
        const snapshot = await database.ref('keys').once('value');
        const data = snapshot.val();
        if (data) {
          allKeys = Object.values(data);
        } else {
          allKeys = [];
        }
      } catch (error) {
        console.log('Error:', error);
        allKeys = [];
      }
      document.getElementById('keyCount').innerHTML = allKeys.length;
    }

    async function saveKeyToFirebase(keyData) {
      const notif = document.getElementById('savingNotification');
      notif.style.display = 'flex';
      notif.querySelector('span').innerHTML = 'Menyimpan key ke DATABASE...';
      
      try {
        await database.ref('keys').push().set(keyData);
        allKeys.push(keyData);
        notif.querySelector('span').innerHTML = '✅ Key tersimpan di DATABASE!';
        notif.style.background = '#00ffff';
        setTimeout(() => notif.style.display = 'none', 3000);
        document.getElementById('keyCount').innerHTML = allKeys.length;
        return true;
      } catch (error) {
        notif.querySelector('span').innerHTML = '❌ Gagal menyimpan!';
        notif.style.background = '#ff4444';
        setTimeout(() => notif.style.display = 'none', 3000);
        return false;
      }
    }

    function handleSaveKey() {
      const days = document.getElementById('daySelect').value;
      const keyValue = document.getElementById('manualKeyInput').value.trim();
      
      if (keyValue === '') {
        alert('⚠️ Key tidak boleh kosong!');
        return;
      }
      
      if (days === "2" || days === "3" || days === "7" || days === "30" || days === "permanent") {
        pendingDays = days;
        pendingKey = keyValue;
        
        let typeText = '';
        switch(days) {
          case '2': typeText = '🔒 2 HARI KEY'; break;
          case '3': typeText = '🔒 3 HARI KEY'; break;
          case '7': typeText = '🔒 7 HARI KEY'; break;
          case '30': typeText = '🔒 30 HARI KEY'; break;
          case 'permanent': typeText = '∞ PERMANENT KEY'; break;
        }
        document.getElementById('modalKeyType').innerHTML = typeText;
        document.getElementById('passwordModal').classList.add('active');
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordMsg').innerHTML = '';
      } else {
        saveKeyToDatabase(days, keyValue);
      }
    }

    async function saveKeyToDatabase(days, keyValue) {
      let jenisKey = '';
      switch(days) {
        case 'hour': jenisKey = '1 JAM'; break;
        case '1': jenisKey = '1 HARI'; break;
        case '2': jenisKey = '2 HARI'; break;
        case '3': jenisKey = '3 HARI'; break;
        case '7': jenisKey = '7 HARI'; break;
        case '30': jenisKey = '30 HARI'; break;
        case 'permanent': jenisKey = 'PERMANEN'; break;
      }
      
      const today = new Date();
      const tanggal = `${today.getDate().toString().padStart(2,'0')}-${(today.getMonth()+1).toString().padStart(2,'0')}-${today.getFullYear()}`;
      
      const keyData = {
        key: keyValue,
        jenis: jenisKey,
        tanggal_dibuat: tanggal,
        status: "aktif"
      };
      
      const success = await saveKeyToFirebase(keyData);
      if (success) {
        document.getElementById('hasilKey').value = keyValue;
        document.getElementById('manualKeyInput').value = '';
        
        let detailText = `${jenisKey} • Masa berlaku: `;
        if (jenisKey === 'PERMANEN') detailText += 'Selamanya';
        else if (jenisKey === '1 JAM') detailText += '1 jam';
        else detailText += jenisKey;
        
        document.getElementById('successTitle').innerHTML = `✅ KEY ${jenisKey} BERHASIL!`;
        document.getElementById('successKey').innerHTML = keyValue;
        document.getElementById('successDetail').innerHTML = detailText;
        document.getElementById('successModal').classList.add('active');
        
        setTimeout(() => copyKey(true), 500);
      }
    }

    function closePasswordModal() {
      document.getElementById('passwordModal').classList.remove('active');
      pendingDays = null;
      pendingKey = null;
    }

    function closeSuccessModal() {
      document.getElementById('successModal').classList.remove('active');
    }

    function checkPassword() {
      const pass = document.getElementById('passwordInput').value;
      if (pass === PASSWORD) {
        if (pendingDays && pendingKey) {
          saveKeyToDatabase(pendingDays, pendingKey);
          pendingDays = null;
          pendingKey = null;
        }
        closePasswordModal();
      } else {
        document.getElementById('passwordMsg').innerHTML = '<span style="color:#ff4444;">❌ Password salah!</span>';
        document.getElementById('passwordInput').value = '';
      }
    }

    function copyKey(silent = false) {
      const key = document.getElementById('hasilKey').value;
      if (!key) return;
      
      navigator.clipboard.writeText(key).then(() => {
        if (!silent) {
          const notif = document.getElementById('copyNotification');
          notif.style.display = 'block';
          setTimeout(() => notif.style.display = 'none', 2000);
        }
      });
    }

    loadKeysFromFirebase();
  </script>
</body>
</html>
