<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>PUTZZDEV • KEY GENERATOR</title>
  
  <!-- FONTS & ICONS -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* CYBER BACKGROUND */
    .cyber-grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    /* GLOW EFFECTS */
    .glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(0, 255, 255, 0.15);
      filter: blur(80px);
      z-index: 1;
      animation: glowPulse 4s ease-in-out infinite;
    }

    .glow-1 { top: -100px; left: -100px; }
    .glow-2 { bottom: -100px; right: -100px; background: rgba(255, 0, 255, 0.15); animation-delay: -2s; }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.2); }
    }

    /* MAIN CARD */
    .generator-card {
      position: relative;
      z-index: 10;
      width: 550px;
      background: rgba(10, 10, 20, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 30px;
      padding: 40px;
      box-shadow: 
        0 0 50px rgba(0, 255, 255, 0.2),
        inset 0 0 30px rgba(0, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .generator-card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #00ffff, #ff00ff, #00ffff);
      border-radius: 32px;
      z-index: -1;
      animation: borderRotate 4s linear infinite;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .generator-card:hover::before {
      opacity: 1;
    }

    @keyframes borderRotate {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header i {
      font-size: 48px;
      color: #00ffff;
      text-shadow: 0 0 20px #00ffff;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #00ffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      letter-spacing: 1px;
    }

    /* PASSWORD MODAL */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
      z-index: 9999;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-box {
      width: 380px;
      background: rgba(10, 10, 20, 0.98);
      border: 2px solid #00ffff;
      border-radius: 25px;
      padding: 35px;
      text-align: center;
      box-shadow: 0 0 60px #00ffff;
      animation: modalPop 0.4s ease;
    }

    @keyframes modalPop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .modal-box i {
      font-size: 50px;
      color: #00ffff;
      margin-bottom: 20px;
    }

    .modal-box h3 {
      color: #fff;
      font-size: 22px;
      margin-bottom: 10px;
    }

    .modal-box .key-type {
      color: #00ffff;
      font-size: 16px;
      margin-bottom: 25px;
      padding: 8px 15px;
      background: rgba(0, 255, 255, 0.1);
      border-radius: 20px;
      display: inline-block;
    }

    .modal-box input {
      width: 100%;
      padding: 15px;
      background: #000;
      border: 2px solid #00ffff;
      border-radius: 15px;
      color: #00ffff;
      font-size: 18px;
      margin-bottom: 25px;
      text-align: center;
    }

    .modal-box .btn-group {
      display: flex;
      gap: 10px;
    }

    .modal-box button {
      flex: 1;
      padding: 12px;
      background: linear-gradient(45deg, #00ffff, #ff00ff);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    .modal-box button.cancel {
      background: transparent;
      border: 2px solid #ff4444;
      color: #ff4444;
    }

    /* SUCCESS MODAL - NOTIFIKASI BESAR */
    .success-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      z-index: 10000;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .success-modal-overlay.active {
      display: flex;
    }

    .success-modal-box {
      width: 450px;
      background: rgba(10, 10, 20, 0.98);
      border: 3px solid #00ff00;
      border-radius: 30px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 0 80px #00ff00;
      animation: successPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes successPop {
      0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    .success-modal-box i {
      font-size: 70px;
      color: #00ff00;
      margin-bottom: 25px;
      text-shadow: 0 0 30px #00ff00;
    }

    .success-modal-box h2 {
      color: #00ff00;
      font-size: 28px;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .success-modal-box .success-key {
      background: rgba(0, 255, 0, 0.1);
      border: 2px solid #00ff00;
      border-radius: 15px;
      padding: 20px;
      margin: 20px 0;
      font-family: monospace;
      font-size: 18px;
      color: #00ff00;
      word-break: break-all;
    }

    .success-modal-box .success-detail {
      color: rgba(255, 255, 255, 0.8);
      font-size: 16px;
      margin: 15px 0;
      line-height: 1.6;
    }

    .success-modal-box .success-detail span {
      color: #00ff00;
      font-weight: bold;
    }

    .success-modal-box button {
      background: linear-gradient(45deg, #00ff00, #00ffff);
      border: none;
      border-radius: 15px;
      padding: 15px 40px;
      color: #000;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s;
    }

    .success-modal-box button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px #00ff00;
    }

    /* DROPDOWN STYLE */
    .select-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .select-wrapper i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #00ffff;
      z-index: 1;
    }

    select {
      width: 100%;
      padding: 15px 20px 15px 50px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid rgba(0, 255, 255, 0.3);
      border-radius: 15px;
      font-size: 16px;
      color: #fff;
      appearance: none;
      cursor: pointer;
    }

    select:hover {
      border-color: #00ffff;
    }

    .select-wrapper::after {
      content: '\f078';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #00ffff;
    }

    /* INPUT KEY MANUAL */
    .input-key-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .input-key-wrapper i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #00ffff;
      font-size: 18px;
      z-index: 1;
    }

    #manualKeyInput {
      width: 100%;
      padding: 15px 20px 15px 50px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid rgba(0, 255, 255, 0.3);
      border-radius: 15px;
      font-size: 16px;
      color: #00ffff;
      font-family: 'Space Grotesk', sans-serif;
    }

    #manualKeyInput:focus {
      outline: none;
      border-color: #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
    }

    #manualKeyInput::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    /* BUTTON STYLE */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(45deg, #00ffff, #ff00ff);
      border: none;
      border-radius: 15px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 255, 255, 0.4);
    }

    /* KEY DISPLAY */
    .key-display {
      position: relative;
      margin: 20px 0;
    }

    .key-display i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #00ffff;
    }

    #hasilKey {
      width: 100%;
      padding: 15px 20px 15px 50px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid rgba(0, 255, 255, 0.3);
      border-radius: 15px;
      font-size: 14px;
      color: #00ffff;
      text-align: center;
    }

    /* COPY BUTTON */
    .btn-copy {
      width: 100%;
      padding: 15px;
      background: transparent;
      border: 2px solid #00ffff;
      border-radius: 15px;
      font-size: 16px;
      font-weight: 600;
      color: #00ffff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .btn-copy:hover {
      background: #00ffff;
      color: #000;
    }

    /* STATUS MESSAGE */
    .status-msg {
      margin-top: 20px;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      font-size: 14px;
      display: none;
    }

    .status-msg.success {
      display: block;
      background: rgba(0, 255, 0, 0.1);
      border: 1px solid #00ff00;
      color: #00ff00;
    }

    .status-msg.error {
      display: block;
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid #ff0000;
      color: #ff0000;
    }

    .status-msg.info {
      display: block;
      background: rgba(0, 255, 255, 0.1);
      border: 1px solid #00ffff;
      color: #00ffff;
    }

    /* KEY INFO */
    .key-info {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0, 255, 255, 0.05);
      border-radius: 10px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
    }

    .key-info span {
      color: #00ffff;
      font-weight: 600;
    }

    .key-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 10px;
      margin-left: 5px;
    }

    .badge-free {
      background: #00ff00;
      color: #000;
    }

    .badge-protected {
      background: #ff00ff;
      color: #fff;
    }

    .badge-hour {
      background: #ffaa00;
      color: #000;
    }

    /* NOTIFICATION */
    .copy-notification {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 255, 255, 0.9);
      color: #000;
      padding: 12px 25px;
      border-radius: 50px;
      font-weight: bold;
      z-index: 10002;
      display: none;
      animation: slideUp 0.3s ease;
      box-shadow: 0 0 30px #00ffff;
    }

    @keyframes slideUp {
      0% { bottom: 0; opacity: 0; }
      100% { bottom: 30px; opacity: 1; }
    }

    /* SAVING NOTIFICATION */
    .saving-notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #00ffff;
      color: #000;
      padding: 15px 25px;
      border-radius: 50px;
      box-shadow: 0 10px 30px rgba(0, 255, 255, 0.5);
      display: none;
      align-items: center;
      gap: 10px;
      z-index: 2000;
      animation: slideIn 0.3s ease;
      font-weight: bold;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @media (max-width: 500px) {
      .generator-card {
        width: 90%;
        padding: 30px 20px;
      }
      .success-modal-box {
        width: 90%;
        padding: 30px;
      }
    }
  </style>
</head>
<body>

  <!-- BACKGROUND EFFECTS -->
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="cyber-grid"></div>

  <!-- SAVING NOTIFICATION -->
  <div class="saving-notification" id="savingNotification">
    <i class="fas fa-database"></i>
    <span>Menyimpan key ke DATABASE...</span>
  </div>

  <!-- PASSWORD MODAL -->
  <div class="modal-overlay" id="passwordModal" onclick="closePasswordModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <i class="fas fa-lock"></i>
      <h3>MASUKKAN PASSWORD</h3>
      <div class="key-type" id="modalKeyType">🔒 PROTECTED KEY</div>
      <input type="password" id="passwordInput" placeholder="PASSWORD..." autocomplete="off" onkeypress="if(event.key==='Enter') checkPassword()">
      <div class="btn-group">
        <button onclick="checkPassword()"><i class="fas fa-check"></i> SUBMIT</button>
        <button class="cancel" onclick="closePasswordModal()"><i class="fas fa-times"></i> BATAL</button>
      </div>
      <div id="passwordMsg"></div>
    </div>
  </div>

  <!-- SUCCESS MODAL - NOTIFIKASI BESAR -->
  <div class="success-modal-overlay" id="successModal" onclick="closeSuccessModal()">
    <div class="success-modal-box" onclick="event.stopPropagation()">
      <i class="fas fa-check-circle"></i>
      <h2 id="successTitle">KEY BERHASIL DIBUAT!</h2>
      <div class="success-key" id="successKey">PUTZZDEV-ABC123</div>
      <div class="success-detail" id="successDetail">
        <span>1 HARI</span> • Masa berlaku: 1 hari
      </div>
      <button onclick="closeSuccessModal()">OK</button>
    </div>
  </div>

  <!-- NOTIFICATION -->
  <div class="copy-notification" id="copyNotification">
    <i class="fas fa-check-circle"></i> KEY BERHASIL DISALIN!
  </div>

  <!-- MAIN CARD -->
  <div class="generator-card">
    
    <div class="header">
      <i class="fas fa-key"></i>
      <h1>KEY GENERATOR FIREBASE</h1>
      <div class="subtitle">PUTZZDEV SECURE SYSTEM</div>
    </div>

    <!-- DROPDOWN JENIS KEY -->
    <div class="select-wrapper">
      <i class="fas fa-calendar-alt"></i>
      <select id="daySelect">
        <option value="1">⚡ 1 DAY ACCESS <span style="color:#00ff00">(FREE)</span></option>
        <option value="hour">⏰ 1 JAM ACCESS <span style="color:#00ff00">(FREE)</span></option>
        <option value="2">🔒 2 DAY ACCESS <span style="color:#ff00ff">(PROTECTED)</span></option>
        <option value="3">🔒 3 DAY ACCESS <span style="color:#ff00ff">(PROTECTED)</span></option>
        <option value="7">🔒 7 DAY ACCESS <span style="color:#ff00ff">(PROTECTED)</span></option>
        <option value="30">🔒 30 DAY ACCESS <span style="color:#ff00ff">(PROTECTED)</span></option>
        <option value="permanent">∞ PERMANENT ACCESS <span style="color:#ff00ff">(PROTECTED)</span></option>
      </select>
    </div>

    <!-- INPUT KEY MANUAL -->
    <div class="input-key-wrapper">
      <i class="fas fa-pencil-alt"></i>
      <input type="text" id="manualKeyInput" placeholder="KETIK KEY KAMU DI SINI..." value="">
    </div>

    <!-- SIMPAN KEY BUTTON -->
    <button class="btn-primary" onclick="handleSaveKey()">
      <i class="fas fa-save"></i> SIMPAN KEY KE DATABASE
    </button>

    <!-- KEY DISPLAY -->
    <div class="key-display">
      <i class="fas fa-id-card"></i>
      <input type="text" id="hasilKey" placeholder="KEY AKAN MUNCUL DISINI" readonly>
    </div>

    <!-- COPY BUTTON -->
    <button class="btn-copy" onclick="copyKey()">
      <i class="fas fa-copy"></i> COPY KEY
    </button>

    <!-- STATUS MESSAGE -->
    <div id="statusMsg" class="status-msg"></div>

    <!-- KEY INFO -->
    <div class="key-info">
      <i class="fas fa-database"></i> 
      KEY TERSIMPAN DI DATABASE: <br>
      <span id="keyCount">0</span> key telah tersimpan
    </div>
  </div>

  <!-- FIREBASE SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <script>
    const PASSWORD = "Putzzdev";
    
    // 🔥 FIREBASE CONFIG - PAKAI YANG KAMU PUNYA!
    const firebaseConfig = {
      apiKey: "AIzaSyB3WWClZiZ890Wf9zaYwcOGfKOl8OjPuU8",
      authDomain: "keyweb-f8e96.firebaseapp.com",
      databaseURL: "https://keyweb-f8e96-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "keyweb-f8e96",
      storageBucket: "keyweb-f8e96.firebasestorage.app",
      messagingSenderId: "255752835945",
      appId: "1:255752835945:web:bd95a38875d563241263f8"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let generatedKey = '';
    let pendingDays = null;
    let pendingKey = '';
    let allKeys = [];

    // Load keys from Firebase
    async function loadKeysFromFirebase() {
      try {
        const snapshot = await database.ref('keys').once('value');
        const data = snapshot.val();
        
        if (data) {
          // Convert object ke array
          allKeys = Object.values(data);
          console.log('Keys loaded:', allKeys.length);
        } else {
          allKeys = [];
        }
      } catch (error) {
        console.log('Error loading from Firebase:', error);
        allKeys = [];
      }
      
      updateKeyCount();
    }

    function updateKeyCount() {
      document.getElementById('keyCount').innerHTML = allKeys.length;
    }

    // Simpan key ke Firebase
    async function saveKeyToFirebase(keyData) {
      const notif = document.getElementById('savingNotification');
      notif.style.display = 'flex';
      notif.querySelector('span').innerHTML = 'Menyimpan key ke DATABASE...';
      
      try {
        // Generate ID unik
        const newKey = database.ref().child('keys').push().key;
        
        // Simpan data ke path /keys/[unique-id]
        await database.ref('keys/' + newKey).set(keyData);
        
        // Update local array
        allKeys.push(keyData);
        
        notif.querySelector('span').innerHTML = 'Key tersimpan di DATABASE!';
        notif.style.background = '#00ffff';
        notif.style.color = '#000';
        
        updateKeyCount();
        
        setTimeout(() => {
          notif.style.display = 'none';
        }, 3000);
        
        return true;
        
      } catch (error) {
        console.error('Error Firebase:', error);
        notif.querySelector('span').innerHTML = 'Gagal menyimpan!';
        notif.style.background = '#ff4444';
        notif.style.color = '#fff';
        
        setTimeout(() => {
          notif.style.display = 'none';
        }, 3000);
        
        return false;
      }
    }

    // Handle save key
    function handleSaveKey() {
      const select = document.getElementById("daySelect");
      const days = select.value;
      const manualKey = document.getElementById("manualKeyInput").value.trim();
      
      if (manualKey === '') {
        alert('Key tidak boleh kosong!');
        return;
      }
      
      if (days === "2" || days === "3" || days === "7" || days === "30" || days === "permanent") {
        pendingDays = days;
        pendingKey = manualKey;
        
        let keyTypeText = '';
        switch(days) {
          case '2': keyTypeText = '🔒 2 DAY KEY'; break;
          case '3': keyTypeText = '🔒 3 DAY KEY'; break;
          case '7': keyTypeText = '🔒 7 DAY KEY'; break;
          case '30': keyTypeText = '🔒 30 DAY KEY'; break;
          case 'permanent': keyTypeText = '∞ PERMANENT KEY'; break;
        }
        
        document.getElementById('modalKeyType').innerHTML = keyTypeText;
        document.getElementById('passwordModal').classList.add('active');
        setTimeout(() => {
          document.getElementById('passwordInput').focus();
        }, 300);
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordMsg').innerHTML = '';
      } else {
        saveKeyToDatabase(days, manualKey);
      }
    }

    // Fungsi untuk mendapatkan detail berdasarkan jenis key
    function getKeyDetails(jenisKey) {
      switch(jenisKey) {
        case '1 JAM':
          return { icon: '⏰', duration: '1 jam', color: '#ffaa00' };
        case '1 HARI':
          return { icon: '📅', duration: '1 hari', color: '#00ff00' };
        case '2 HARI':
          return { icon: '📅', duration: '2 hari', color: '#00ff00' };
        case '3 HARI':
          return { icon: '📅', duration: '3 hari', color: '#00ff00' };
        case '7 HARI':
          return { icon: '📅', duration: '7 hari', color: '#00ff00' };
        case '30 HARI':
          return { icon: '📅', duration: '30 hari', color: '#00ff00' };
        case 'PERMANEN':
          return { icon: '♾️', duration: 'Selamanya', color: '#ff00ff' };
        default:
          return { icon: '🔑', duration: '-', color: '#00ffff' };
      }
    }

    // Tampilkan modal sukses
    function showSuccessModal(jenisKey, keyValue) {
      const details = getKeyDetails(jenisKey);
      
      document.getElementById('successTitle').innerHTML = `✅ KEY ${jenisKey} BERHASIL!`;
      document.getElementById('successKey').innerHTML = keyValue;
      document.getElementById('successDetail').innerHTML = `
        <span>${details.icon} ${jenisKey}</span> • Masa berlaku: ${details.duration}
      `;
      
      // Warna border sesuai jenis key
      const modal = document.querySelector('.success-modal-box');
      modal.style.borderColor = details.color;
      modal.style.boxShadow = `0 0 80px ${details.color}`;
      
      document.getElementById('successModal').classList.add('active');
    }

    function closeSuccessModal() {
      document.getElementById('successModal').classList.remove('active');
    }

    async function saveKeyToDatabase(days, keyValue) {
      let jenisKey = '';
      switch(days) {
        case '1': jenisKey = '1 HARI'; break;
        case 'hour': jenisKey = '1 JAM'; break;
        case '2': jenisKey = '2 HARI'; break;
        case '3': jenisKey = '3 HARI'; break;
        case '7': jenisKey = '7 HARI'; break;
        case '30': jenisKey = '30 HARI'; break;
        case 'permanent': jenisKey = 'PERMANEN'; break;
      }
      
      const today = new Date();
      const tanggal = `${today.getDate().toString().padStart(2, '0')}-${(today.getMonth() + 1).toString().padStart(2, '0')}-${today.getFullYear()}`;
      const jam = `${today.getHours().toString().padStart(2, '0')}:${today.getMinutes().toString().padStart(2, '0')}`;
      
      const keyData = {
        key: keyValue,
        jenis: jenisKey,
        tanggal_dibuat: tanggal,
        jam_dibuat: jam,
        status: "aktif"
      };
      
      const berhasil = await saveKeyToFirebase(keyData);
      
      if (berhasil) {
        document.getElementById('hasilKey').value = keyValue;
        generatedKey = keyValue;
        
        document.getElementById('manualKeyInput').value = '';
        
        // Tampilkan modal sukses BESAR
        showSuccessModal(jenisKey, keyValue);
        
        // Auto copy
        setTimeout(() => {
          copyKey(true);
        }, 500);
      }
    }

    function closePasswordModal() {
      document.getElementById('passwordModal').classList.remove('active');
      pendingDays = null;
      pendingKey = '';
    }

    function checkPassword() {
      const pass = document.getElementById('passwordInput').value;
      const msg = document.getElementById('passwordMsg');
      
      if (pass === PASSWORD) {
        msg.style.color = '#00ff00';
        msg.innerHTML = '<i class="fas fa-check-circle"></i> Password benar!';
        
        if (pendingDays && pendingKey) {
          saveKeyToDatabase(pendingDays, pendingKey);
          pendingDays = null;
          pendingKey = '';
        }
        
        setTimeout(() => {
          closePasswordModal();
        }, 500);
        
      } else {
        msg.style.color = '#ff4444';
        msg.innerHTML = '<i class="fas fa-times-circle"></i> Password salah!';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    }

    function showNotification() {
      const notif = document.getElementById('copyNotification');
      notif.style.display = 'block';
      setTimeout(() => {
        notif.style.display = 'none';
      }, 2000);
    }

    function copyKey(silent = false) {
      const output = document.getElementById("hasilKey");
      const statusMsg = document.getElementById("statusMsg");
      
      if (!output.value) {
        if (!silent) {
          statusMsg.className = 'status-msg warning';
          statusMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Tidak ada key';
        }
        return;
      }

      output.select();
      output.setSelectionRange(0, 99999);
      
      try {
        navigator.clipboard.writeText(output.value).then(() => {
          if (!silent) {
            statusMsg.className = 'status-msg success';
            statusMsg.innerHTML = '<i class="fas fa-check-circle"></i> Key disalin!';
          }
        }).catch(() => {
          document.execCommand("copy");
        });
      } catch (err) {
        document.execCommand("copy");
      }
    }

    // Load keys saat halaman dimuat
    window.addEventListener('load', () => {
      loadKeysFromFirebase();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (document.getElementById('passwordModal').classList.contains('active')) {
          closePasswordModal();
        }
        if (document.getElementById('successModal').classList.contains('active')) {
          closeSuccessModal();
        }
      }
    });

    document.querySelector('.modal-box').addEventListener('click', (e) => {
      e.stopPropagation();
    });
  </script>
</body>
</html>
